# Render Blueprint — optional. For manual services, add the SPA rewrite in Dashboard (see DEPLOY.md).
services:
  - type: web
    name: astromoon-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: astromoon-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_PLAY_STORE_URL
        sync: false
      - key: VITE_APK_DOWNLOAD_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html